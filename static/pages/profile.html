<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Hotels Booking</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">🏨 Hotels Booking</a>
            <div class="nav-links" id="navLinks">
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="alert" id="alert"></div>

        <h1 class="page-title">Мой профиль</h1>

        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="userAvatar">U</div>
                <div class="profile-info">
                    <h2 id="name">Загрузка...</h2>
                    <p>Пользователь</p>
                </div>
            </div>

            <div class="profile-section">
                <h3>Информация об аккаунте</h3>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="profileEmail">-</span>
                </div>
            </div>

            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--border-color);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">
                    Выйти из аккаунта
                </button>
            </div>
        </div>
    </main>

    <script src="/static/js/messages.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/hotels.js"></script>
    <script src="/static/js/bookings.js"></script>
    <script src="/static/js/profile.js"></script>
    <script src="/static/js/main.js"></script>
</body>

</html>
